<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala de Espera — Sapiens</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a2a1a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: #2a3a2a;
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid #5a7a5a;
    flex-shrink: 0;
  }
  .header-logo { display:flex; align-items:center; gap:16px; }
  .logo-circle { width:56px; height:56px; background:#5a7a5a; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:26px; }
  .logo-text h1 { font-size:22px; font-weight:800; letter-spacing:3px; color:#a8c5a0; }
  .logo-text p  { font-size:10px; letter-spacing:1.5px; color:#7a9a7a; text-transform:uppercase; margin-top:2px; }
  .header-right { text-align:right; }
  .reloj { font-size:36px; font-weight:700; color:#a8c5a0; font-variant-numeric:tabular-nums; }
  .live-label { font-size:11px; color:#5a7a5a; margin-top:3px; }
  .dot-live { width:8px; height:8px; background:#4caf50; border-radius:50%; display:inline-block; margin-right:5px; animation:pulso 2s ease-in-out infinite; }

  /* Grid de consultorios */
  .consultorios-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    padding: 0;
  }

  .consultorio-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 30px;
    border-right: 2px solid #2a3a2a;
    min-height: 0;
    position: relative;
    transition: background 0.4s;
  }
  .consultorio-panel:last-child { border-right: none; }
  .consultorio-panel.activo { background: #1e2e1e; }
  .consultorio-panel.inactivo { background: #161e16; }

  .cons-numero {
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #5a7a5a;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .cons-nombre {
    font-size: clamp(22px, 3vw, 32px);
    font-weight: 800;
    color: #a8c5a0;
    margin-bottom: 6px;
    text-align: center;
  }
  .cons-profesional {
    font-size: clamp(14px, 1.8vw, 20px);
    color: #7a9a7a;
    margin-bottom: 32px;
    text-align: center;
  }
  .cons-divider {
    width: 60px; height: 3px;
    background: #3a5a3a;
    border-radius: 2px;
    margin-bottom: 32px;
  }

  .llamado-label {
    font-size: clamp(12px, 1.5vw, 16px);
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #7c3aed;
    font-weight: 700;
    margin-bottom: 12px;
    animation: pulso 1.5s ease-in-out infinite;
  }
  .paciente-nombre {
    font-size: clamp(36px, 5.5vw, 72px);
    font-weight: 900;
    color: #fff;
    text-align: center;
    letter-spacing: 1px;
    line-height: 1.1;
    animation: aparecer 0.4s ease;
  }
  .esperando-txt {
    font-size: clamp(18px, 2.5vw, 28px);
    color: #3a5a3a;
    text-align: center;
    font-weight: 600;
  }
  .tiempo-llamado {
    font-size: 12px;
    color: #5a7a5a;
    margin-top: 14px;
  }

  /* Pie */
  .footer {
    background: #2a3a2a;
    padding: 10px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-top: 2px solid #3a5a3a;
    flex-shrink: 0;
  }
  .footer-label { font-size:11px; color:#5a7a5a; text-transform:uppercase; letter-spacing:2px; font-weight:700; white-space:nowrap; }
  .footer-items { display:flex; gap:12px; flex-wrap:nowrap; overflow:hidden; }
  .footer-item { font-size:12px; color:#7a9a7a; white-space:nowrap; padding:3px 12px; background:#3a5a3a; border-radius:20px; }

  @keyframes aparecer { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulso { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="logo-circle">🌿</div>
    <div class="logo-text">
      <h1>SAPIENS</h1>
      <p>Rehabilitación e Investigación Multidisciplinaria</p>
    </div>
  </div>
  <div class="header-right">
    <div class="reloj" id="reloj">--:--:--</div>
    <div class="live-label"><span class="dot-live"></span>Actualización en tiempo real</div>
  </div>
</div>

<div class="consultorios-grid" id="grid">
  <!-- generado por JS -->
</div>

<div class="footer">
  <span class="footer-label">Recientes</span>
  <div class="footer-items" id="footer-items">—</div>
</div>

<script>
const SUPA_URL = 'https://pjlpldpqqbhigwqxfykf.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqbHBsZHBxcWJoaWd3cXhmeWtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDk3NTA4NTgsImV4cCI6MjAyNTMyNjg1OH0.LPSkCOBKBvPBFwZkBUvEMYD6YllxnbWN4QRxKdT-8GE';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

var CONSULTORIOS = ['1', '2'];
var estado = {};  // { '1': {paciente_nombre, profesional_nombre, llamado_at}, '2': ... }
var historial = [];

// Reloj
setInterval(function(){
  var n = new Date();
  document.getElementById('reloj').textContent =
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
}, 1000);

function fmtHora(iso) {
  if(!iso) return '';
  var d = new Date(iso);
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function renderGrid() {
  var html = CONSULTORIOS.map(function(c) {
    var s = estado[c];
    var activo = !!s;
    return '<div class="consultorio-panel '+(activo?'activo':'inactivo')+'">'
      +'<div class="cons-numero">Consultorio '+c+'</div>'
      +(s ? '<div class="cons-nombre"></div>' : '')
      +(s ? '<div class="cons-profesional">'+s.profesional_nombre+'</div>' : '<div class="cons-profesional" style="color:#2a4a2a;">Sin profesional asignado</div>')
      +'<div class="cons-divider"></div>'
      +(s
        ? '<div class="llamado-label">📢 Pasar a consultorio</div>'
          +'<div class="paciente-nombre">'+s.paciente_nombre+'</div>'
          +'<div class="tiempo-llamado">Llamado a las '+fmtHora(s.llamado_at)+'</div>'
        : '<div class="esperando-txt">Aguarde...</div>')
      +'</div>';
  }).join('');
  document.getElementById('grid').innerHTML = html;
}

function renderFooter() {
  var items = document.getElementById('footer-items');
  if(!historial.length) { items.innerHTML = '<span style="color:#3a5a3a;">Sin llamados recientes</span>'; return; }
  items.innerHTML = historial.slice(0,8).map(function(h){
    return '<span class="footer-item">'+h.paciente_nombre+' → Cons. '+h.consultorio_key+' ('+fmtHora(h.llamado_at)+')</span>';
  }).join('');
}

function sonidoLlamado() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523, 659, 784].forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      gain.gain.setValueAtTime(0.25, ctx.currentTime + i*0.18);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.18 + 0.4);
      osc.start(ctx.currentTime + i*0.18);
      osc.stop(ctx.currentTime + i*0.18 + 0.5);
    });
  } catch(e) {}
}

async function cargarEstado() {
  var res = await sb.from('llamador').select('*').order('llamado_at', {ascending:false}).limit(20);
  var data = res.data || [];
  // Estado actual: el más reciente por consultorio
  estado = {};
  data.forEach(function(row) {
    if(!estado[row.consultorio_key]) estado[row.consultorio_key] = row;
  });
  historial = data;
  renderGrid();
  renderFooter();
}

cargarEstado();

// Realtime
sb.channel('llamador-live')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'llamador' }, function(payload) {
    var row = payload.new;
    if(row && row.paciente_nombre) {
      estado[row.consultorio_key] = row;
      historial.unshift(row);
      if(historial.length > 20) historial = historial.slice(0,20);
      renderGrid();
      renderFooter();
      sonidoLlamado();
    }
  })
  .subscribe();

// Polling fallback cada 15s
setInterval(cargarEstado, 15000);
</script>
</body>
</html>
